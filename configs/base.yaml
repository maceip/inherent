model:
  # Single supported backbone. The runtime contract consumes mel_spectrogram,
  # not raw waveform, so pretrained raw-audio fallback backbones are forbidden.
  backbone: small_conformer
  num_heads: 13
  hidden_size: 256
  num_layers: 6
  num_attention_heads: 4
  conv_kernel_size: 31
  mel_bins: 128
  max_frames: 3000  # 60s at 20ms hop

data:
  sample_rate: 16000
  hop_ms: 20
  mel_bins: 128
  max_seconds: 60
  directedness:
    # Public directed commands. These use the same strict loaders as intent data.
    positives: [slurp, speech_massive]
    # AMI/FSD-style local trees can be added under data/<source>. Speech Commands
    # is verified-accessible but large, so it is reserved for production configs.
    negatives: [ami]
    positive_manifests: []
    negative_manifests: []
    labeled_manifests: []
    max_public_samples_per_source: 20000
    noise_mix: [musan, demand]
    snr_db_range: [0, 25]
  intents:
    public_sources: [slurp, speech_massive]
    recorded: []
    synthetic_manifests: [synthetic_manifest.csv]
    public:
      add_to_list: [slurp.lists_*, speech_massive.lists_createoradd]
      term_search: [slurp.qa_*, speech_massive.general_quirky]
      calendar_event: [slurp.calendar_set, slurp.calendar_create, slurp.calendar_update, slurp.calendar_remove]
      start_timer: [slurp.alarm_set, speech_massive.alarm_set]
    synthetic:
      photo_query: { count: 8000, voices: ['openvoice', 'cosyvoice2'] }
      create_doc: { count: 8000, voices: ['openvoice', 'cosyvoice2'] }
      person_context: { count: 8000, voices: ['openvoice', 'cosyvoice2'] }
      event_context: { count: 8000, voices: ['openvoice', 'cosyvoice2'] }
      deep_research: { count: 8000, voices: ['openvoice', 'cosyvoice2'] }
      insight: { count: 8000, voices: ['openvoice', 'cosyvoice2'] }
      browsing_agent: { count: 8000, voices: ['openvoice', 'cosyvoice2'] }
      calling_agent: { count: 8000, voices: ['openvoice', 'cosyvoice2'] }

training:
  batch_size: 32
  learning_rate: 3.0e-4
  weight_decay: 1.0e-2
  warmup_steps: 1000
  max_steps: 100000
  eval_every_steps: 2000
  save_every_steps: 2000
  loss: focal_bce  # focal binary cross-entropy per head
  focal_gamma: 2.0
  class_weights: balanced
  train_manifest: data/train_manifest.csv
  eval_manifest: data/eval_manifest.csv
  num_workers: 4
  device: cuda
  seed: 1337

export:
  backend: tflite
  delegates: [cpu]
  quantization: float16
  representative_dataset_size: 500
  target_size_mb: 50
  output_path: artifacts/inherent.tflite
  metadata_path: artifacts/inherent.metadata.json
  onnx_path: artifacts/inherent.onnx
  onnx_metadata_path: artifacts/inherent.onnx.metadata.json
  mlx_dir: artifacts/mlx
  litertlm_path: artifacts/inherent.litertlm
  onnx_opset: 17
  onnx_sample_frames: 50
  onnx_static_frames: 3000
  parity_atol: 1.0e-4
  require_tflite_parity: true
  tflite_parity_eval_samples: 256
  tflite_parity_max_abs_diff: 0.005
  tflite_parity_mean_abs_diff: 0.0005

eval:
  held_out_audio_dir: data/eval_recorded
  metrics: [auc_per_head, eer_per_head, false_positive_at_recall_95]
  pass_threshold:
    is_interesting: { auc: 0.85, eer: 0.15 }
    intent_heads: { mean_auc: 0.80, min_auc: 0.70 }
