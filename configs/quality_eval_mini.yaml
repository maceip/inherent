# Fast quality loop: small model, short train, held-out sketch eval manifest.
# Use after materializing mels for data/quality_eval_sketch.csv (or a recorded subset).
model:
  backbone: small_conformer
  num_heads: 13
  hidden_size: 128
  num_layers: 2
  num_attention_heads: 4
  conv_kernel_size: 15
  mel_bins: 128
  max_frames: 3000

data:
  sample_rate: 16000
  hop_ms: 20
  mel_bins: 128
  max_seconds: 60
  directedness:
    positives: []
    negatives: []
    positive_manifests: []
    negative_manifests: []
    labeled_manifests: []
    max_public_samples_per_source: 500
    noise_mix: []
    snr_db_range: [0, 25]
  intents:
    public_sources: []
    recorded: []
    synthetic_manifests: [synthetic_manifest.csv]
    public: {}
    synthetic: {}

training:
  batch_size: 8
  learning_rate: 3.0e-4
  weight_decay: 1.0e-2
  warmup_steps: 50
  max_steps: 500
  eval_every_steps: 100
  save_every_steps: 100
  loss: focal_bce
  focal_gamma: 2.0
  class_weights: balanced
  sampler: label_balanced
  padding: runtime_static
  train_manifest: data/quality_eval_mini_train_mels.csv
  eval_manifest: data/quality_eval_mini_eval_mels.csv
  num_workers: 0
  device: mps
  seed: 1337

export:
  backend: tflite
  delegates: [cpu]
  quantization: float16
  representative_dataset_size: 64
  target_size_mb: 50
  output_path: artifacts/quality-eval-mini/inherent.tflite
  metadata_path: artifacts/quality-eval-mini/inherent.metadata.json
  onnx_path: artifacts/quality-eval-mini/inherent.onnx
  onnx_metadata_path: artifacts/quality-eval-mini/inherent.onnx.metadata.json
  mlx_dir: artifacts/quality-eval-mini/mlx
  litertlm_path: artifacts/quality-eval-mini/inherent.litertlm
  onnx_opset: 17
  onnx_sample_frames: 50
  onnx_static_frames: 3000
  strict_tensor_names: false
  parity_atol: 1.0e-4
  require_tflite_parity: false

eval:
  held_out_audio_dir: data/eval_recorded
  metrics: [auc_per_head, eer_per_head, false_positive_at_recall_95]
  pass_threshold:
    is_interesting: { auc: 0.85, eer: 0.15 }
    intent_heads: { mean_auc: 0.80, min_auc: 0.70, max_fpr_at_recall_95: 0.20 }
